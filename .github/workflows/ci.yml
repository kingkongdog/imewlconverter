name: CI

# 触发条件:推送到主分支或 PR
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch: # 允许手动触发

# 并发控制:同一分支/PR 只保留最新的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 权限最小化
permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # macOS 平台构建 (CLI + GUI)
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    timeout-minutes: 40
    
    strategy:
      matrix:
        arch: [x64]
        include:
          - arch: x64
            runtime: osx-x64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: make restore

      - name: Publish CLI
        run: |
          dotnet publish --configuration Release \
            -p:PublishSingleFile=true \
            --self-contained false \
            -r ${{ matrix.runtime }} \
            --output ./publish/${{ matrix.runtime }}/cli \
            ./src/ImeWlConverterCmd

      - name: Build and publish macOS GUI
        run: |
          dotnet publish ./src/ImeWlConverterMac \
            --configuration Release \
            --self-contained true \
            --runtime ${{ matrix.runtime }} \
            --output ./publish/${{ matrix.runtime }}/gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: ./publish/${{ matrix.runtime }}
          retention-days: 7

  # 所有构建完成后的状态检查
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - build-macos
    if: always()
    
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.build-macos.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs succeeded"